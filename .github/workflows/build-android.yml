name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Cache Gradle packages
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          ./gradlew assembleRelease -x lint
          ./gradlew assembleRelease --info --parallel --build-cache -Pandroid.enableR8=true -Pandroid.useAndroidX=true

      - name: Minification with ProGuard
        run: |
          ./gradlew assembleRelease -PenableProguard=true

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: android-apk
          path: app/build/outputs/apk/release/app-release.apk
