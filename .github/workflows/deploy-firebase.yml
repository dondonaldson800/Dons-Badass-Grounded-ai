name: Deploy Don's Empire to Firebase
on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    name: Build & Deploy Super App
    runs-on: ubuntu-latest
    
    env:
      NODE_VERSION: '20'
      
    steps:
      - name: 🏰 Checkout Don's Empire
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📥 Install Dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: 🔧 Build & Sync Environment
        working-directory: ./frontend
        env:
          REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          REACT_APP_ADMOB_PUB_ID: pub-8715031019966551
          REACT_APP_ADMOB_APP_ID: 6268835652
          REACT_APP_BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://engine-chip.preview.emergentagent.com' }}
        run: |
          echo "Building Don's Empire - 20 Apps Container..."
          echo "REACT_APP_SENTRY_DSN=$REACT_APP_SENTRY_DSN" >> .env.production
          echo "REACT_APP_ADMOB_PUB_ID=$REACT_APP_ADMOB_PUB_ID" >> .env.production
          echo "REACT_APP_ADMOB_APP_ID=$REACT_APP_ADMOB_APP_ID" >> .env.production
          echo "REACT_APP_BACKEND_URL=$REACT_APP_BACKEND_URL" >> .env.production
          yarn build

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_DONS_EMPIRE }}"
          projectId: "249321727719"
          channelId: live

      - name: 📊 Deployment Summary
        run: |
          echo "✅ Don's Empire deployed successfully!"
          echo "🏰 Firebase Project: 249321727719"
          echo "💰 AdMob Publisher: pub-8715031019966551"
          echo "📈 Sentry tracking enabled"
          echo "🎯 20-App Super Container LIVE!"
