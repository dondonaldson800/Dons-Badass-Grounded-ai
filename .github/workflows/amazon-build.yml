name: Deploy to Amazon Appstore

on:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: npm install

      - name: Build Amazon APK
        run: eas build --platform android --profile production --non-interactive --no-wait --path ./
          
