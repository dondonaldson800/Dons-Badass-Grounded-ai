name: Master Architecture Deploy - Don's Grounded Empire

on:
  push:
    branches:
      - main # Triggers on merge to production

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # --------------------------------------------------------
      # FIREBASE BACKEND DEPLOYMENT (Functions, Rules, Hosting)
      # --------------------------------------------------------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Security Rules
        run: firebase deploy --only firestore:rules,storage:rules --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firebase Cloud Functions
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

      # --------------------------------------------------------
      # EXPO FRONTEND BUILD (React Native via EAS)
      # --------------------------------------------------------
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android App Bundle for Play Store)
        run: eas build --platform android --profile production --non-interactive

      - name: EAS Build (iOS Archive for App Store)
        run: eas build --platform ios --profile production --non-interactive
        
