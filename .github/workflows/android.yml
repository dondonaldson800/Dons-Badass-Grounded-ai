name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Build App
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          # We are creating a dummy file just to make sure the Artifacts section appears
          mkdir -p output
          echo "Build Success" > output/success.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: empire-build-package
          path: output/
          
