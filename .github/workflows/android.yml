name: Build and Sign APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: |
          export CI=false
          npm run build --if-present || true

      - name: Sign Any APK Found
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > release.keystore
          
          # This will search every folder for any .apk file created
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK found! We need to generate one first."
            exit 1
          else
            echo "Found APK at $APK_PATH. Signing now..."
            jarsigner -keystore release.keystore \
              -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              "$APK_PATH" empire-alias
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: empire-signed-app
          path: "**/*.apk"
          
