name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # Upgraded to v4 to prevent deprecation failures
    - name: Checkout Source
      uses: actions/checkout@v4

    # Upgraded to v5
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade buildozer cython virtualenv

    # MASTER ARCHITECTURE FIX: Inject 8GB of Swap Space to prevent memory crash
    - name: Create Virtual Memory (Swap Space)
      run: |
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Execute Buildozer
      run: |
        yes | buildozer -v android debug

    # MASTER ARCHITECTURE FIX: Upgraded upload-artifact to v4
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dons-Badass-AI-APK
        path: bin/*.apk
        
