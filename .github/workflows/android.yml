name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: build
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          # Create a folder and a dummy file to force the Artifacts section to show up
          mkdir -p output
          echo "Build finished successfully" > output/status.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: grounded-ai-package
          path: output/
          
